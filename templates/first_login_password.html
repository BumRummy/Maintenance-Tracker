{% extends 'base.html' %}
{% block content %}
<div class="login-wrap">
  <h1>Change Password</h1>
  <form method="post" class="card">
    <p style="margin:0 0 .5rem;color:#64748b;font-size:.9rem;">You must set a new password before continuing.</p>
    <label>New Password <input type="password" name="new_password" required minlength="8"></label>
    <label>Confirm Password <input type="password" name="confirm_password" required minlength="8"></label>
    <button type="submit" class="btn-primary">Save new password</button>
  </form>
</div>
{% endblock %}
