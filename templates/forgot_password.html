{% extends 'base.html' %}
{% block content %}
<div class="login-wrap">
  <h1>Forgot Password</h1>
  <form method="post" class="card">
    <label>Username <input name="username" required autofocus></label>
    <button type="submit" class="btn-primary">Send reset email</button>
    <p style="margin-top:.75rem;font-size:.9rem;color:#64748b;">Didn't receive it? Submit again to resend.</p>
    <a href="{{ url_for('login') }}" style="font-size:.9rem;">Back to login</a>
  </form>
</div>
{% endblock %}
