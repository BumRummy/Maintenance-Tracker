version: "3.9"
services:
  maintenance-tracker:
    build: .
    container_name: maintenance-tracker
    ports:
      - "${WEB_PORT:-7070}:${WEB_PORT:-7070}"
    environment:
      WEB_HOST: 0.0.0.0
      WEB_PORT: ${WEB_PORT:-7070}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      CONFIG_PATH: ${CONFIG_PATH:-/config}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-noreply@bmiMaintenance.com}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - ${CONFIG_LOCATION:-./config}:${CONFIG_PATH:-/config}
    restart: unless-stopped
